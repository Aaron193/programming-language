[[export]]
name = "PACKAGE_ID"
type = "str"
doc = "Canonical namespaced package identifier."

[[export]]
name = "create"
type = "fn(i64) -> handle<examples:counter:CounterHandle>"
doc = "Create a new counter handle."

[[export]]
name = "read"
type = "fn(handle<examples:counter:CounterHandle>) -> i64"
doc = "Read the current counter value."

[[export]]
name = "add"
type = "fn(handle<examples:counter:CounterHandle>, i64) -> i64"
doc = "Add to the counter and return the updated value."
